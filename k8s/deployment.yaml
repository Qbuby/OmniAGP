apiVersion: v1
kind: Namespace
metadata:
  name: omniagp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: omniagp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
        - name: nats
          image: nats:2.10-alpine
          args: ["--jetstream", "--store_dir", "/data"]
          ports:
            - containerPort: 4222
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: omniagp
spec:
  selector:
    app: nats
  ports:
    - port: 4222
      targetPort: 4222
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
  namespace: omniagp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scheduler
  template:
    metadata:
      labels:
        app: scheduler
    spec:
      containers:
        - name: scheduler
          image: omniagp/scheduler:latest
          ports:
            - containerPort: 8081
          env:
            - name: NATS_URL
              value: "nats://nats:4222"
            - name: RUST_LOG
              value: "info"
---
apiVersion: v1
kind: Service
metadata:
  name: scheduler
  namespace: omniagp
spec:
  selector:
    app: scheduler
  ports:
    - port: 8081
      targetPort: 8081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: omniagp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: omniagp/api-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: NATS_URL
              value: "nats://nats:4222"
            - name: RUST_LOG
              value: "info"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: omniagp
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-gpu
  namespace: omniagp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker-gpu
  template:
    metadata:
      labels:
        app: worker-gpu
    spec:
      containers:
        - name: worker
          image: omniagp/worker:latest
          env:
            - name: NATS_URL
              value: "nats://nats:4222"
            - name: SCHEDULER_URL
              value: "http://scheduler:8081"
            - name: WORKER_LOCATION
              value: "cloud"
            - name: RUST_LOG
              value: "info"
          resources:
            limits:
              nvidia.com/gpu: 1
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: worker-gpu-hpa
  namespace: omniagp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: worker-gpu
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: External
      external:
        metric:
          name: scheduler_queue_depth
        target:
          type: AverageValue
          averageValue: "5"
