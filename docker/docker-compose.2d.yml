version: "3.9"

services:
  comfyui:
    image: ghcr.io/ai-dock/comfyui:latest
    ports:
      - "8188:8188"
    volumes:
      - comfyui-models:/opt/ComfyUI/models
      - comfyui-output:/opt/ComfyUI/output
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - CLI_ARGS=--lowvram --fp16-vae

  asset-2d:
    build:
      context: ./pipelines/asset-2d
    ports:
      - "8100:8100"
    environment:
      - COMFYUI_URL=http://comfyui:8188
      - OUTPUT_DIR=/data/assets
    volumes:
      - asset-output:/data/assets
    depends_on:
      - comfyui

  api-gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.api-gateway
    ports:
      - "8080:8080"
    environment:
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-qwen2.5-coder-7b}
      - ASSET_2D_URL=http://asset-2d:8100
      - RUST_LOG=info
    depends_on:
      - asset-2d

volumes:
  comfyui-models:
  comfyui-output:
  asset-output:
