services:
  qdrant:
    image: qdrant/qdrant:v1.12.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped

  pipeline-3d:
    build:
      context: ../pipelines/pipeline_3d
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    volumes:
      - pipeline_3d_output:/app/output
    environment:
      - PIPELINE3D_TRIPOSR_DEVICE=cuda
      - PIPELINE3D_SDXL_API_URL=${PIPELINE3D_SDXL_API_URL:-}
      - PIPELINE3D_SDXL_API_KEY=${PIPELINE3D_SDXL_API_KEY:-}
      - PIPELINE3D_HUNYUAN3D_API_URL=${PIPELINE3D_HUNYUAN3D_API_URL:-}
      - PIPELINE3D_HUNYUAN3D_API_KEY=${PIPELINE3D_HUNYUAN3D_API_KEY:-}
      - PIPELINE3D_DEFAULT_BACKEND=${PIPELINE3D_DEFAULT_BACKEND:-triposr}
      - PIPELINE3D_OUTPUT_DIR=/app/output
      - PIPELINE3D_TEMP_DIR=/app/tmp
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8090/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3

  audio-pipeline:
    build:
      context: ../pipelines/audio
      dockerfile: Dockerfile
    ports:
      - "8093:8090"
    volumes:
      - audio_output:/app/output
    environment:
      - DEVICE=cuda
      - DTYPE=float16
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  asset-sidecar:
    build:
      context: ../services/asset-sidecar
      dockerfile: Dockerfile
    ports:
      - "8100:8100"
    environment:
      - SIDECAR_HOST=0.0.0.0
      - SIDECAR_PORT=8100
      - SIDECAR_MAX_CONCURRENT_JOBS=4
      - SIDECAR_RUST_ORCHESTRATOR_URL=http://host.docker.internal:8080
    volumes:
      - asset_output:/tmp/asset-sidecar/output
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  asset-director:
    build:
      context: ../agents/asset_director
      dockerfile: Dockerfile
    ports:
      - "8092:8092"
    environment:
      - AUDIO_PIPELINE_URL=http://audio-pipeline:8090
      - IMAGE_PIPELINE_URL=http://image-pipeline:8091
    depends_on:
      - audio-pipeline
    restart: unless-stopped

  api-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api-gateway
    ports:
      - "8080:8080"
    environment:
      - AUDIO_PIPELINE_URL=http://audio-pipeline:8090
      - ASSET_DIRECTOR_URL=http://asset-director:8092
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-qwen2.5-coder-7b}
    depends_on:
      - audio-pipeline
      - asset-director
    restart: unless-stopped

volumes:
  qdrant_data:
  pipeline_3d_output:
  audio_output:
  asset_output:
