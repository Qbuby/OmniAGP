services:
  qdrant:
    image: qdrant/qdrant:v1.12.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped

  audio-pipeline:
    build:
      context: ../pipelines/audio
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    volumes:
      - audio_output:/app/output
    environment:
      - DEVICE=cuda
      - DTYPE=float16
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  asset-director:
    build:
      context: ../agents/asset_director
      dockerfile: Dockerfile
    ports:
      - "8092:8092"
    environment:
      - AUDIO_PIPELINE_URL=http://audio-pipeline:8090
      - IMAGE_PIPELINE_URL=http://image-pipeline:8091
    depends_on:
      - audio-pipeline
    restart: unless-stopped

  api-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api-gateway
    ports:
      - "8080:8080"
    environment:
      - AUDIO_PIPELINE_URL=http://audio-pipeline:8090
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-qwen2.5-coder-7b}
    depends_on:
      - audio-pipeline
      - asset-director
    restart: unless-stopped

volumes:
  qdrant_data:
  audio_output:
