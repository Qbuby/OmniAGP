services:
  qdrant:
    image: qdrant/qdrant:v1.12.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped

  asset-sidecar:
    build:
      context: ../services/asset-sidecar
      dockerfile: Dockerfile
    ports:
      - "8100:8100"
    environment:
      - SIDECAR_HOST=0.0.0.0
      - SIDECAR_PORT=8100
      - SIDECAR_MAX_CONCURRENT_JOBS=4
      - SIDECAR_RUST_ORCHESTRATOR_URL=http://host.docker.internal:8080
    volumes:
      - asset_output:/tmp/asset-sidecar/output
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  qdrant_data:
  asset_output:
